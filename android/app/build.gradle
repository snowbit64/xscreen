plugins {
    id 'com.android.application'
}

android {
    namespace 'com.safgame.xscreen'
    compileSdk 34

    defaultConfig {
        applicationId "com.safgame.xscreen"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "0.1.0"

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }

        externalNativeBuild {
            cmake {
                arguments '-DXSCREEN_BUILD_ANDROID=ON',
                          '-DANDROID_STL=c++_shared'
                cppFlags '-std=c++17'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "../../CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}
